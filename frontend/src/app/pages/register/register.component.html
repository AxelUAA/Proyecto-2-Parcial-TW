<div class="auth-page page-wrapper">
  <div class="auth-container">
    <div class="auth-card">
      <!-- Header -->
      <div class="auth-header">
        <div class="auth-logo"></div>
        <h1>Únete al equipo</h1>
        <p>Crea tu cuenta y accede a drops exclusivos</p>
      </div>

      <!-- Error -->
      @if (errorMessage) {
        <div class="alert alert-error"> {{ errorMessage }}</div>
      }

      <!-- Form -->
      <form (submit)="onSubmit()" #registerForm="ngForm" class="auth-form">
        <div class="form-group">
          <label class="form-label" for="name">Nombre completo</label>
          <input
            id="name"
            type="text"
            class="form-control"
            placeholder="Tu nombre"
            [(ngModel)]="name"
            name="name"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input
            id="email"
            type="email"
            class="form-control"
            placeholder="tu@email.com"
            [(ngModel)]="email"
            name="email"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input
            id="password"
            type="password"
            class="form-control"
            placeholder="Mínimo 6 caracteres"
            [(ngModel)]="password"
            name="password"
            required
            minlength="6"
          />
        </div>

        <button
          type="submit"
          class="btn btn-primary btn-lg auth-btn"
          [disabled]="isLoading"
        >
          @if (isLoading) {
            <span class="btn-spinner"></span> Creando cuenta...
          } @else {
            Crear cuenta 
          }
        </button>
      </form>

      <!-- Footer -->
      <div class="auth-footer">
        <p>¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
      </div>
    </div>
  </div>
</div>
